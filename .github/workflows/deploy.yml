name: deploy

# Application + schema pipeline. Runs on merge to main.
# ORDER MATTERS: migrate the DB only AFTER code is deployed and healthy,
# but BEFORE traffic relies on the new schema. For simple forward-compatible
# migrations, run migrate first; for risky ones, use expand/contract.
# Default below: deploy code, then run Flyway migrate.
#
# Required secrets:
#   SSH_HOST           droplet public IP
#   SSH_PRIVATE_KEY    private key whose public half is on the droplet (deploy user)
#   FLYWAY_URL         jdbc:mysql://<private-host>:<port>/upq?...   (use PRIVATE host)
#   FLYWAY_USER        upq_app
#   FLYWAY_PASSWORD    app DB password (from terraform output)
#   TEST_USER          username for the read-only post-deploy smoke test (test/test-integration.js)
#   TEST_PASS          password for TEST_USER — must have Microsoft + Google already connected

on:
  push:
    branches: [main]
    paths-ignore: ['terraform/**', 'cloud-init/**', '**.md']

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never interrupt a deploy mid-flight

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy code to droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/deploy/upq || git clone git@github.com:alan-johnson/hb-task-server-enterprise.git /home/deploy/upq && cd /home/deploy/upq
            git fetch --all
            git reset --hard origin/main
            npm ci --omit=dev
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save

  smoke-test:
    needs: deploy-app          # tests the live server, so it can only run after deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Read-only smoke test against production
        env:
          BASE_URL:  https://tasks.handsbreadth.com
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
        run: node test/test-integration.js
      - name: Beta API / MCP smoke test against production
        # Safe against prod: sandbox data is isolated per API key (see
        # src/providers/sandbox.js) and never touches this account's real
        # connected Microsoft/Google data. Mints and revokes its own key.
        env:
          BASE_URL:  https://tasks.handsbreadth.com
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASS: ${{ secrets.TEST_PASS }}
        run: npm run test:beta

  migrate-db:
    needs: smoke-test          # only migrate after code is live AND verified healthy
    runs-on: ubuntu-latest
    steps:
      - name: Run Flyway migrations on droplet
        uses: appleboy/ssh-action@v1.0.3
        env:
          FLYWAY_URL: ${{ secrets.FLYWAY_URL }}
          FLYWAY_USER: ${{ secrets.FLYWAY_USER }}
          FLYWAY_PASSWORD: ${{ secrets.FLYWAY_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: FLYWAY_URL,FLYWAY_USER,FLYWAY_PASSWORD
          script: |
            set -euo pipefail
            FLYWAY_DIR="/home/deploy/flyway"
            FLYWAY_VERSION="10.17.0"
            if [ ! -f "${FLYWAY_DIR}/flyway" ]; then
              rm -rf "${FLYWAY_DIR}"
              mkdir -p "${FLYWAY_DIR}"
              curl -s "https://download.red-gate.com/maven/release/com/redgate/flyway/flyway-commandline/${FLYWAY_VERSION}/flyway-commandline-${FLYWAY_VERSION}-linux-x64.tar.gz" \
                | tar xz -C "${FLYWAY_DIR}" --strip-components=1
            fi
            "${FLYWAY_DIR}/flyway" \
              -url="${FLYWAY_URL}" \
              -user="${FLYWAY_USER}" \
              -password="${FLYWAY_PASSWORD}" \
              -locations="filesystem:/home/deploy/upq/upq_terraform_files/upq-infra/migrations" \
              -baselineOnMigrate=true \
              migrate
