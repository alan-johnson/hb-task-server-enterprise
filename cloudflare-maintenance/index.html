<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpQ — Maintenance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f4f6fb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(24,36,113,.10);
      padding: 3rem 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .logo {
      max-width: 260px;
      width: 100%;
      height: auto;
      margin-bottom: 2.25rem;
      border-radius: 10px;
    }
    h1 {
      font-size: 1.55rem;
      font-weight: 700;
      color: #182471;
      margin-bottom: .65rem;
      letter-spacing: -.01em;
    }
    p {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <!--
      IMPORTANT: After your first Cloudflare Pages deploy, replace REPLACE_WITH_PAGES_URL
      below with your actual *.pages.dev URL (e.g. https://upq-maintenance.pages.dev).
      The browser resolves this URL from the UpQ domain context, so it must be absolute.
    -->
    <img class="logo" src="REPLACE_WITH_PAGES_URL/UpQ-branding-image-web.png" alt="UpQ">
    <h1>Undergoing Maintenance</h1>
    <p>Please check back later.</p>
  </div>
</body>
</html>
