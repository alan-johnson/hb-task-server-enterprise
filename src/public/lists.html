<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpQ task server — Lists</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="site-theme.css">
  <link rel="stylesheet" href="upq-app-components.css">
</head>
<body class="dashboard">
  <header class="site-header">
    <a href="/lists.html" class="hb-logo-lockup">
      <img src="/images/handsbreadth-logo-web-new-transparent-no-tagline.png" alt="handsbreadth - Turn Chaos into Clarity" class="logo-constrained">
      <span class="hb-logo-tagline">Turn Chaos into Clarity</span>
    </a>
    <div style="display:flex;align-items:center;gap:.5rem">
      <span class="upq-logo-lockup">
        <span class="upq-logo-text" style="font-size:22px;">UpQ</span>
        <span class="upq-logo-tagline">Unified Task Server</span>
      </span>
    </div>
  </header>
  <div class="dashboard-container">

    <div class="dashboard-header">
      <div>
        <h1>Task Lists</h1>
        <div class="user-info" id="user-info">Loading…</div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
        <a href="/all-tasks.html" class="btn btn-primary btn-sm">All Tasks</a>
        <a href="/settings.html" class="btn btn-secondary btn-sm">Settings</a>
        <a href="/developer.html" class="btn btn-secondary btn-sm">Developer</a>
        <a href="/support.html" class="btn btn-secondary btn-sm">Support</a>
        <button class="btn btn-secondary btn-sm" style="white-space:nowrap" onclick="logout()">Log Out</button>
      </div>
    </div>

    <div id="subscription-warning" style="display:none"></div>
    <div id="banner" class="banner" style="display:none"></div>

    <!-- Provider filter tabs -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-provider="all" onclick="setFilter('all')">All</button>
    </div>

    <!-- Lists grid -->
    <div id="lists-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <div>Loading lists…</div>
      </div>
    </div>

  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/login.html'; }

    const PROVIDERS = {
      microsoft: { label: 'Microsoft',       icon: '🟦', color: '#1565c0', bg: '#e3f2fd' },
      google:    { label: 'Google',          icon: '🟥', color: '#b71c1c', bg: '#ffebee' },
      apple:     { label: 'Apple Reminders', icon: '🍎', color: '#1d1d1f', bg: '#f5f5f7' }
    };

    let allLists = [];         // [{ provider, id, name, updated, taskCount }]
    let activeFilter = localStorage.getItem('listsFilter') || 'all';
    let connectedProviders = [];

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    function showBanner(msg, type = 'success') {
      const el = document.getElementById('banner');
      el.textContent = msg;
      el.className = `banner banner-${type}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 6000);
    }

    async function checkSubscriptionStatus() {
      const DISMISSED_KEY = 'sub_warning_dismissed';
      const dismissedAt = localStorage.getItem(DISMISSED_KEY);
      if (dismissedAt && Date.now() - parseInt(dismissedAt, 10) < 24 * 60 * 60 * 1000) return;
      try {
        const r = await fetch('/billing/status', { headers: authHeaders() });
        if (!r.ok) return;
        const billing = await r.json();
        const status = billing.subscriptionStatus;
        const now = Date.now();
        let msg = null; let actionUrl = null; let actionLabel = null;
        if (status === 'past_due') {
          msg = 'Payment failed — your subscription is past due.';
          actionUrl = '/settings.html'; actionLabel = 'Update billing';
        } else if (status === 'none' || status === 'canceled') {
          const justActivated = parseInt(localStorage.getItem('sub_just_activated') || '0', 10);
          if (Date.now() - justActivated < 5 * 60 * 1000) return; // webhook still in transit
          window.location.href = '/pricing.html'; return;
        } else if (status === 'trialing' && billing.trialEnd) {
          const days = Math.max(0, Math.ceil((new Date(billing.trialEnd) - now) / 86400000));
          if (days <= 14) {
            msg = days === 0 ? 'Your free trial ends today.' : `Your free trial ends in ${days} day${days === 1 ? '' : 's'}.`;
            actionUrl = '/pricing.html'; actionLabel = 'Subscribe now';
          }
        } else if (status === 'active' && billing.cancelAtPeriodEnd && billing.currentPeriodEnd) {
          const days = Math.max(0, Math.ceil((new Date(billing.currentPeriodEnd) - now) / 86400000));
          if (days <= 14) {
            const endDate = new Date(billing.currentPeriodEnd).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            msg = `Your subscription ends in ${days} day${days === 1 ? '' : 's'} (${endDate}).`;
            actionUrl = '/settings.html'; actionLabel = 'Manage subscription';
          }
        }
        if (!msg) return;
        const el = document.getElementById('subscription-warning');
        el.className = 'banner banner-warning';
        el.innerHTML = `<span>${escHtml(msg)} <a href="${actionUrl}">${escHtml(actionLabel)}</a></span><button class="banner-dismiss" onclick="dismissSubWarning()" title="Dismiss">&#x2715;</button>`;
        el.style.display = 'flex';
      } catch (_) { /* silently ignore */ }
    }

    function dismissSubWarning() {
      localStorage.setItem('sub_warning_dismissed', Date.now().toString());
      const el = document.getElementById('subscription-warning');
      if (el) el.style.display = 'none';
    }

    function setFilter(provider) {
      activeFilter = provider;
      localStorage.setItem('listsFilter', provider);
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.provider === provider);
      });
      renderLists();
    }

    function renderLists() {
      const container = document.getElementById('lists-container');
      const filtered = activeFilter === 'all'
        ? allLists
        : allLists.filter(l => l.provider === activeFilter);

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">No lists found.</div>`;
        return;
      }

      container.innerHTML = filtered.map(list => {
        const p = PROVIDERS[list.provider] || { label: list.provider, icon: '📋', color: '#555', bg: '#f0f0f0' };
        const updated = list.updated ? new Date(list.updated).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '';
        const href = `/tasks.html?provider=${encodeURIComponent(list.provider)}&listId=${encodeURIComponent(list.id)}&listName=${encodeURIComponent(list.name)}`;
        const countHtml = list.taskCount === null
          ? `<span class="list-count list-count-loading" id="count-${list._idx}">…</span>`
          : `<span class="list-count" id="count-${list._idx}">${list.taskCount}</span>`;
        return `
          <a class="list-card list-card-link" href="${href}">
            <div class="list-icon">${p.icon}</div>
            <div class="list-info">
              <div class="list-name">${escHtml(list.name)}</div>
              ${updated ? `<div class="list-meta">Updated ${updated}</div>` : ''}
            </div>
            ${countHtml}
            <span class="badge" style="background:${p.bg};color:${p.color}">${p.label}</span>
          </a>
        `;
      }).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // One request per provider returns counts for all its lists at once
    async function fetchCountsForProvider(provider) {
      try {
        const res = await fetch(
          `/api/lists/counts?provider=${encodeURIComponent(provider)}`,
          { headers: authHeaders() }
        );
        if (!res.ok) return;
        const data = await res.json();
        const counts = data.counts || {};
        allLists.forEach(list => {
          if (list.provider !== provider || counts[list.id] === undefined) return;
          list.taskCount = counts[list.id];
          const el = document.getElementById(`count-${list._idx}`);
          if (el) {
            el.textContent = list.taskCount;
            el.classList.remove('list-count-loading');
          }
        });
      } catch { /* leave as … */ }
    }

    async function init() {
      checkSubscriptionStatus(); // non-blocking — banner appears when ready
      // Load user info
      try {
        const res = await fetch('/auth/me', { headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        document.getElementById('user-info').textContent =
          `Signed in as ${data.user.username}`;
      } catch {
        document.getElementById('user-info').textContent = '';
      }

      // Fetch all lists across all connected providers in one call
      let data;
      const maxRetries = 5;
      for (let attempt = 0; attempt <= maxRetries; attempt++) {
        try {
          const res = await fetch('/api/lists/all', { headers: authHeaders() });

          if (res.status === 402) {
            const justActivated = parseInt(localStorage.getItem('sub_just_activated') || '0', 10);
            if (attempt < maxRetries && Date.now() - justActivated < 5 * 60 * 1000) {
              document.getElementById('lists-container').innerHTML =
                '<div class="loading-state"><div class="spinner"></div><div>Activating subscription…</div></div>';
              await new Promise(r => setTimeout(r, 2000));
              continue;
            }
            localStorage.removeItem('sub_just_activated');
            window.location.href = '/pricing.html';
            return;
          }

          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          localStorage.removeItem('sub_just_activated');
          data = await res.json();
          break;
        } catch (err) {
          showBanner('Failed to load lists: ' + err.message, 'error');
          document.getElementById('lists-container').innerHTML =
            `<div class="empty-state">Could not load lists.</div>`;
          return;
        }
      }

      connectedProviders = data.providers || [];

      if (connectedProviders.length === 0) {
        window.location.href = '/settings.html?reconnect=true';
        return;
      }

      // If saved filter is for a provider that isn't connected, reset to 'all'
      if (activeFilter !== 'all' && !connectedProviders.includes(activeFilter)) {
        activeFilter = 'all';
        localStorage.setItem('listsFilter', 'all');
      }

      // Build filter tabs
      const filterBar = document.getElementById('filter-bar');
      connectedProviders.forEach(p => {
        const pr = PROVIDERS[p] || { label: p, icon: '📋' };
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.provider = p;
        btn.onclick = () => setFilter(p);
        btn.textContent = `${pr.icon} ${pr.label}`;
        filterBar.appendChild(btn);
      });

      allLists = (data.lists || []).map((l, i) => ({ ...l, taskCount: null, _idx: i }));
      renderLists();

      // Fetch counts per provider (one request per provider covers all its lists)
      connectedProviders.forEach(p => fetchCountsForProvider(p));
    }

    init();
  </script>
  <footer class="site-footer">Copyright 2026, handsbreadth LLC</footer>
</body>
</html>
