<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpQ — Maintenance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f4f6fb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(24,36,113,.10);
      padding: 3rem 3.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .logo {
      max-width: 260px;
      width: 100%;
      height: auto;
      margin-bottom: 2.25rem;
      border-radius: 10px;
    }
    h1 {
      font-size: 1.55rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: .65rem;
      letter-spacing: -.01em;
    }
    p {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
    }
  </style>
  <link rel="stylesheet" href="site-theme.css">
  <link rel="stylesheet" href="upq-app-components.css">
</head>
<body>
  <div class="card">
    <span class="upq-logo-lockup" style="align-items:center;">
      <span class="upq-logo-text" style="font-size:32px;">UpQ</span>
      <span class="upq-logo-tagline">Unified Task Server</span>
    </span>
    <h1>Undergoing Maintenance</h1>
    <p>Please check back later.</p>
  </div>
</body>
</html>
