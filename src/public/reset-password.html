<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Server — Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <header class="site-header hero">
    <img src="/images/handsbreadth-logo-web.png" alt="handsbreadth — Solutions in the Palm of Your Hand">
  </header>
  <div class="auth-wrap">
  <div class="auth-container">
    <h1 id="form-title">Reset Password</h1>

    <div id="error-msg" class="error-msg"></div>

    <!-- Reset form -->
    <div id="reset-panel">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input id="new-password" type="password" autocomplete="new-password" minlength="8" required>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>
      </div>
      <button class="btn btn-primary" id="submit-btn" onclick="doReset(event)">Set New Password</button>
    </div>

    <!-- Success panel -->
    <div id="success-panel" style="display:none;text-align:center">
      <div style="width:56px;height:56px;background:#6fb768;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
          <path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 style="color:#182471;font-size:1.2rem;margin:0 0 .5rem">Password Updated</h2>
      <p style="color:#555;font-size:.93rem;line-height:1.6;margin:0 0 1.25rem">
        Your password has been changed successfully.
      </p>
      <a href="/" class="btn btn-primary" style="display:inline-block;text-decoration:none">Sign In</a>
    </div>

    <!-- Invalid token panel -->
    <div id="invalid-panel" style="display:none;text-align:center">
      <p style="color:#b71c1c;font-size:.95rem;line-height:1.6;margin:0 0 1.25rem">
        This reset link is invalid or has expired. Please request a new one.
      </p>
      <a href="/" style="font-size:.88rem;color:#182471">Back to Sign In</a>
    </div>
  </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('reset-panel').style.display   = 'none';
      document.getElementById('invalid-panel').style.display = '';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function doReset(e) {
      e.preventDefault();
      hideError();
      const newPassword     = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }
      if (newPassword !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const res  = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'Could not reset password.');
          if (res.status === 400 && data.error && data.error.toLowerCase().includes('invalid')) {
            document.getElementById('reset-panel').style.display   = 'none';
            document.getElementById('invalid-panel').style.display = '';
          }
          return;
        }
        document.getElementById('reset-panel').style.display   = 'none';
        document.getElementById('success-panel').style.display = '';
        document.getElementById('form-title').textContent      = 'Password Updated';
      } catch {
        showError('Could not reach the server. Is it running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      }
    }
  </script>
  <footer class="site-footer">Copyright 2026, handsbreadth LLC</footer>
</body>
</html>
