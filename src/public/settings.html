<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Server — Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">
  <div class="dashboard-container">

    <div class="dashboard-header">
      <div>
        <h1>Settings</h1>
        <div class="user-info" id="user-info">Loading…</div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <a href="/lists.html" class="btn btn-primary btn-sm">View Lists</a>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Log Out</button>
      </div>
    </div>

    <div id="banner" class="banner" style="display:none"></div>

    <div class="section-title">Connected Providers</div>

    <div class="provider-grid">

      <!-- Apple Reminders -->
      <div class="provider-card">
        <div class="provider-icon">🍎</div>
        <div class="provider-info">
          <div class="provider-name">Apple Reminders</div>
          <div class="provider-desc">Native macOS integration — no setup required</div>
        </div>
        <div class="provider-actions">
          <span class="badge badge-builtin">Built-in</span>
          <button class="btn btn-secondary btn-sm" onclick="setDefault('apple')">Set as Default</button>
        </div>
      </div>

      <!-- Microsoft Tasks -->
      <div class="provider-card" id="card-microsoft">
        <div class="provider-icon">🟦</div>
        <div class="provider-info">
          <div class="provider-name">Microsoft Tasks</div>
          <div class="provider-desc">Microsoft To Do via Microsoft 365</div>
        </div>
        <div class="provider-actions" id="actions-microsoft">
          <span id="status-microsoft"></span>
        </div>
      </div>

      <!-- Google Tasks -->
      <div class="provider-card" id="card-google">
        <div class="provider-icon">🟥</div>
        <div class="provider-info">
          <div class="provider-name">Google Tasks</div>
          <div class="provider-desc">Google Tasks via Google Workspace</div>
        </div>
        <div class="provider-actions" id="actions-google">
          <span id="status-google"></span>
        </div>
      </div>

    </div>

    <p style="margin-top:2rem;font-size:.8rem;color:#999;text-align:center">
      <a href="/privacy" style="color:#999">Privacy Policy</a> &nbsp;·&nbsp;
      <a href="/terms" style="color:#999">Terms of Service</a>
    </p>

  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/'; }

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    function showBanner(msg, type = 'success') {
      const el = document.getElementById('banner');
      el.textContent = msg;
      el.className = `banner banner-${type}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 6000);
    }

    async function setDefault(provider) {
      try {
        const res = await fetch('/auth/default-provider', {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ provider })
        });
        if (!res.ok) { const d = await res.json(); showBanner(d.error || 'Failed to set default', 'error'); return; }
        showBanner(`${provider.charAt(0).toUpperCase() + provider.slice(1)} set as default provider.`);
        // Refresh user info to show updated default
        loadUserInfo();
      } catch {
        showBanner('Could not reach the server.', 'error');
      }
    }

    async function connectProvider(provider) {
      try {
        const res = await fetch(`/auth/${provider}/url`, { headers: authHeaders() });
        const data = await res.json();
        if (!res.ok) { showBanner(data.error || 'Failed to get auth URL', 'error'); return; }
        window.location.href = data.authUrl;
      } catch {
        showBanner('Could not reach the server.', 'error');
      }
    }

    async function disconnectProvider(provider) {
      if (!confirm(`Disconnect ${provider}? You will need to reconnect to use it again.`)) return;
      try {
        const res = await fetch(`/auth/provider/${provider}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        if (!res.ok) { const d = await res.json(); showBanner(d.error || 'Failed to disconnect', 'error'); return; }
        showBanner(`${provider.charAt(0).toUpperCase() + provider.slice(1)} disconnected.`);
        renderProviderStatus(provider, false);
      } catch {
        showBanner('Could not reach the server.', 'error');
      }
    }

    function renderProviderStatus(provider, connected) {
      const el = document.getElementById(`actions-${provider}`);
      if (connected) {
        el.innerHTML = `
          <span class="badge badge-connected">Connected ✓</span>
          <button class="btn btn-secondary btn-sm" onclick="setDefault('${provider}')">Set as Default</button>
          <button class="btn btn-danger btn-sm" onclick="disconnectProvider('${provider}')">Disconnect</button>
        `;
      } else {
        el.innerHTML = `
          <button class="btn btn-primary btn-sm" onclick="connectProvider('${provider}')">Connect</button>
        `;
      }
    }

    async function loadUserInfo() {
      try {
        const res = await fetch('/auth/me', { headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        document.getElementById('user-info').textContent =
          `Signed in as ${data.user.username}${data.user.defaultProvider ? ' · Default: ' + data.user.defaultProvider : ''}`;
      } catch {
        document.getElementById('user-info').textContent = '';
      }
    }

    async function init() {
      await loadUserInfo();

      // Load provider status
      try {
        const res = await fetch('/auth/providers/status', { headers: authHeaders() });
        const status = await res.json();
        renderProviderStatus('microsoft', status.microsoft);
        renderProviderStatus('google', status.google);
      } catch {
        renderProviderStatus('microsoft', false);
        renderProviderStatus('google', false);
      }

      // Show banners based on query params
      const params = new URLSearchParams(window.location.search);
      const connected = params.get('connected');
      const reconnect = params.get('reconnect');
      if (connected) {
        const name = connected.charAt(0).toUpperCase() + connected.slice(1);
        showBanner(`${name} Tasks connected successfully!`);
        window.history.replaceState({}, '', '/settings.html');
      } else if (reconnect) {
        showBanner('No providers are connected. Please connect at least one to view your lists.', 'error');
        window.history.replaceState({}, '', '/settings.html');
      }
    }

    init();
  </script>
</body>
</html>
