<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpQ task server — Subscription Confirmed</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .success-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .success-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(24,36,113,.10);
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      background: #6fb768;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .success-icon svg {
      width: 32px;
      height: 32px;
    }
    .success-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #182471;
      margin: 0 0 .5rem;
    }
    .plan-summary {
      background: #f4f6fb;
      border-radius: 10px;
      padding: .9rem 1.1rem;
      margin: 1rem 0 1.5rem;
      text-align: left;
    }
    .plan-summary-row {
      display: flex;
      justify-content: space-between;
      font-size: .9rem;
      color: #444;
      padding: .2rem 0;
    }
    .plan-summary-row .label {
      color: #888;
      font-size: .83rem;
    }
    .plan-summary-row .value {
      font-weight: 600;
      color: #182471;
    }
    .ref-id {
      font-size: .75rem;
      color: #bbb;
      margin-top: .5rem;
    }
    .btn-go {
      width: 100%;
      padding: .9rem;
      font-size: 1.05rem;
      font-weight: 700;
    }
  </style>
</head>
<body class="auth-page">
  <header class="site-header hero">
    <img src="/images/handsbreadth-logo-web.png" alt="handsbreadth — Solutions in the Palm of Your Hand">
  </header>
  <div class="success-wrap">
  <div class="success-card">
    <div class="success-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 16l7 7 13-13" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>You're all set!</h1>

    <div class="plan-summary" id="plan-summary" style="display:none">
      <div class="plan-summary-row">
        <span class="label">Plan</span>
        <span class="value" id="plan-label">—</span>
      </div>
      <div class="plan-summary-row" id="period-row" style="display:none">
        <span class="label" id="period-label">Renews</span>
        <span class="value" id="period-value">—</span>
      </div>
    </div>

    <div class="ref-id" id="ref-id"></div>

    <button class="btn btn-primary btn-go" id="continue-btn" onclick="continueToApp()" disabled>
      Continue
    </button>
  </div>
  </div>
  <footer class="site-footer">Copyright 2026, handsbreadth LLC</footer>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/login.html'; }

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function fmtDate(iso) {
      if (!iso) return null;
      return new Date(iso).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' });
    }

    async function loadSessionInfo(sessionId) {
      try {
        const res = await fetch(`/billing/session-info?session_id=${encodeURIComponent(sessionId)}`, {
          headers: authHeaders()
        });
        if (!res.ok) return;
        const data = await res.json();

        let planLabel;
        if (data.plan === 'annual') {
          planLabel = 'Annual subscription';
        } else if (data.plan === 'trial') {
          planLabel = '14-day free trial';
        } else {
          planLabel = 'Monthly subscription';
        }
        document.getElementById('plan-label').textContent = planLabel;

        const periodRow = document.getElementById('period-row');
        if (data.trialEnd) {
          document.getElementById('period-label').textContent = 'Trial ends';
          document.getElementById('period-value').textContent = fmtDate(data.trialEnd);
          periodRow.style.display = '';
        } else if (data.currentPeriodEnd) {
          document.getElementById('period-label').textContent = data.plan === 'annual' ? 'Renews' : 'Next billing';
          document.getElementById('period-value').textContent = fmtDate(data.currentPeriodEnd);
          periodRow.style.display = '';
        }

        document.getElementById('plan-summary').style.display = '';

        // Show truncated session ID as a reference
        const short = sessionId.replace(/^cs_[a-z]+_/, '').slice(-12).toUpperCase();
        document.getElementById('ref-id').textContent = `Ref: …${short}`;
      } catch {
        // Non-fatal — session info is informational only
      }
    }

    async function continueToApp() {
      const btn = document.getElementById('continue-btn');
      btn.disabled = true;
      btn.textContent = 'Loading…';
      try {
        const res = await fetch('/auth/providers/status', { headers: authHeaders() });
        const status = await res.json();
        const anyConnected = Object.values(status).some(Boolean);
        window.location.href = anyConnected ? '/all-tasks.html' : '/settings.html';
      } catch {
        window.location.href = '/settings.html';
      }
    }

    // Load session info if we have a session_id, then enable the button
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    if (sessionId) {
      loadSessionInfo(sessionId).finally(() => {
        document.getElementById('continue-btn').disabled = false;
      });
    } else {
      document.getElementById('continue-btn').disabled = false;
    }
  </script>
</body>
</html>
