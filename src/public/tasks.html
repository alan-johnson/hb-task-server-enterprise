<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpQ task server — Tasks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard">
  <header class="site-header">
    <a href="/lists.html"><img src="/images/handsbreadth-logo-web.png" alt="handsbreadth"></a>
    <div style="display:flex;align-items:center;gap:.5rem">
      <img src="/images/UpQ-branding-image-web.png" alt="UpQ" style="height:40px;width:auto;border-radius:0">
      <div style="display:flex;flex-direction:column;line-height:1.15;font-size:.82rem;font-weight:600;color:#fff;letter-spacing:.01em;text-align:left">
        <span>task</span>
        <span>server</span>
      </div>
    </div>
  </header>
  <div class="dashboard-container">

    <div class="dashboard-header">
      <div>
        <h1 id="page-title">Tasks</h1>
        <div class="user-info" id="user-info">Loading…</div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ New Task</button>
        <a href="/lists.html" class="btn btn-secondary btn-sm">All Lists</a>
        <a href="/settings.html" class="btn btn-secondary btn-sm">Settings</a>
        <div class="filter-dropdown-wrap" id="filter-dropdown-wrap">
          <button class="btn btn-secondary btn-sm filter-icon-btn" id="filter-icon-btn"
                  onclick="toggleFilterDropdown()" title="Filter tasks" aria-haspopup="true" aria-expanded="false">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <line x1="2" y1="4"  x2="14" y2="4"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="4" y1="8"  x2="12" y2="8"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="6" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span id="filter-label">All</span>
          </button>
          <div class="filter-dropdown" id="filter-dropdown" role="menu">
            <button class="filter-option filter-option-active" data-filter="all"     onclick="setFilter('all')"    role="menuitem">All</button>
            <button class="filter-option"                      data-filter="Now"     onclick="setFilter('Now')"    role="menuitem">Now</button>
            <button class="filter-option"                      data-filter="Not Now" onclick="setFilter('Not Now')"role="menuitem">Not Now</button>
            <button class="filter-option"                      data-filter="Later"   onclick="setFilter('Later')"  role="menuitem">Later</button>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" style="white-space:nowrap" onclick="logout()">Log Out</button>
      </div>
    </div>

    <div id="banner" class="banner" style="display:none"></div>

    <div id="tasks-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <div>Loading tasks…</div>
      </div>
    </div>

  </div>

  <!-- ── Task create / edit modal ── -->
  <div id="task-modal" class="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal-box">
      <h2 id="modal-title">New Task</h2>
      <div class="form-group">
        <label for="modal-name">Name</label>
        <input id="modal-name" type="text" placeholder="Task name" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="modal-notes">Notes</label>
        <textarea id="modal-notes" rows="3" placeholder="Optional notes"></textarea>
      </div>
      <div class="form-group">
        <label for="modal-due">Due Date</label>
        <input id="modal-due" type="date">
      </div>
      <div class="form-group" id="priority-group">
        <label for="modal-priority">Priority</label>
        <select id="modal-priority">
          <option value="low">Low (default)</option>
          <option value="normal">Normal</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-submit" onclick="submitModal()">Create Task</button>
      </div>
    </div>
  </div>

  <!-- ── Delete confirmation modal ── -->
  <div id="delete-modal" class="modal-overlay" style="display:none" onclick="handleDeleteOverlayClick(event)">
    <div class="modal-box">
      <h2>Delete Task?</h2>
      <p class="modal-warn-text">Are you sure you want to delete <strong id="delete-task-name"></strong>? This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '/'; }

    const params    = new URLSearchParams(window.location.search);
    const provider  = params.get('provider') || 'microsoft';
    const listId    = params.get('listId')   || '';
    const listName  = params.get('listName') || 'Tasks';

    const PROVIDERS = {
      microsoft: { label: 'Microsoft', icon: '🟦' },
      google:    { label: 'Google',    icon: '🟥' }
    };

    document.getElementById('page-title').textContent = listName;
    document.title = `${listName} — UpQ task server`;
    const p = PROVIDERS[provider] || { label: provider, icon: '📋' };

    // Module state
    let tasksData             = [];
    let showCompleted         = false;
    let editingTaskId         = null;
    let deletingTaskId        = null;
    let activeFilter          = 'all';
    let classificationConfig  = null;

    // Hide priority selector for Google (no priority field)
    if (provider === 'google') {
      document.getElementById('priority-group').style.display = 'none';
    }

    // ── Helpers ────────────────────────────────────────────────

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function logout() { localStorage.clear(); window.location.href = '/'; }

    function showBanner(msg, type = 'success') {
      const el = document.getElementById('banner');
      el.textContent = msg;
      el.className = `banner banner-${type}`;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function escHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Parse any date string to YYYY-MM-DD for <input type="date">
    function toInputDate(raw) {
      if (!raw) return '';
      // Already YYYY-MM-DD or starts with it
      const m = raw.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;
      // Try parsing freeform (e.g. Apple's locale date strings)
      const d = new Date(raw);
      if (isNaN(d)) return '';
      return d.toISOString().slice(0, 10);
    }

    function taskById(id) { return tasksData.find(t => t.id === id); }

    // ── Classification helpers ──────────────────────────────────

    // Display label for a bucket key
    function bucketLabel(key) {
      if (!classificationConfig) return key;
      return { now: classificationConfig.now.label, not_now: classificationConfig.not_now.label, later: classificationConfig.later.label }[key] || key;
    }

    // CSS class fragment for a bucket key ('not_now' → 'not-now')
    function bucketCss(key) { return key.replace('_', '-'); }

    function toggleFilterDropdown() {
      const wrap = document.getElementById('filter-dropdown-wrap');
      const btn  = document.getElementById('filter-icon-btn');
      const open = wrap.classList.toggle('filter-dropdown-open');
      btn.setAttribute('aria-expanded', open);
    }

    function closeFilterDropdown() {
      document.getElementById('filter-dropdown-wrap').classList.remove('filter-dropdown-open');
      document.getElementById('filter-icon-btn').setAttribute('aria-expanded', false);
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', e => {
      if (!document.getElementById('filter-dropdown-wrap').contains(e.target)) {
        closeFilterDropdown();
      }
    });

    // Rebuild filter dropdown labels from the loaded config
    function buildFilterDropdown() {
      const cfg = classificationConfig;
      if (!cfg) return;
      document.getElementById('filter-dropdown').innerHTML = `
        <button class="filter-option filter-option-active" data-filter="all"     onclick="setFilter('all')"     role="menuitem">All</button>
        <button class="filter-option"                      data-filter="now"     onclick="setFilter('now')"     role="menuitem">${escHtml(cfg.now.label)}</button>
        <button class="filter-option"                      data-filter="not_now" onclick="setFilter('not_now')" role="menuitem">${escHtml(cfg.not_now.label)}</button>
        <button class="filter-option"                      data-filter="later"   onclick="setFilter('later')"   role="menuitem">${escHtml(cfg.later.label)}</button>
      `;
    }

    function setFilter(filter) {
      activeFilter = filter;
      document.querySelectorAll('.filter-option').forEach(btn => {
        btn.classList.toggle('filter-option-active', btn.dataset.filter === filter);
      });
      document.getElementById('filter-label').textContent = filter === 'all' ? 'All' : bucketLabel(filter);
      document.getElementById('filter-icon-btn').classList.toggle('filter-icon-btn-active', filter !== 'all');
      closeFilterDropdown();
      const shown = showCompleted ? tasksData : tasksData.filter(t => !t.completed);
      renderTasks(shown);
    }

    // ── Render ─────────────────────────────────────────────────

    function renderTasks(tasks) {
      const container = document.getElementById('tasks-container');

      const incomplete = tasks.filter(t => !t.completed);
      const completed  = tasks.filter(t =>  t.completed);

      // Apply filter
      const filtered = activeFilter === 'all'
        ? incomplete
        : incomplete.filter(t => t.classification === activeFilter);

      const showingAll = activeFilter === 'all';

      if (!filtered.length && !(showingAll && completed.length)) {
        const msg = showingAll
          ? `No tasks in this list.<br><a href="#" onclick="openCreateModal();return false;">Add the first task.</a>`
          : `No <strong>${activeFilter}</strong> tasks.`;
        container.innerHTML = `<div class="empty-state">${msg}</div>`;
        return;
      }

      let html = '';

      if (showingAll && filtered.length) {
        const groups = { now: [], not_now: [], later: [] };
        for (const t of filtered) groups[t.classification].push(t);
        for (const key of ['now', 'not_now', 'later']) {
          if (!groups[key].length) continue;
          const label = bucketLabel(key);
          html += `<div class="tasks-section-label tag-section-${bucketCss(key)}">${label} (${groups[key].length})</div>`;
          html += groups[key].map(t => taskCard(t)).join('');
        }
      } else {
        html += filtered.map(t => taskCard(t)).join('');
      }

      // Completed tasks are only shown in the "All" view — they have no classification
      if (showingAll && completed.length) {
        html += `<div class="tasks-section-label">Completed (${completed.length})</div>`;
        html += completed.map(t => taskCard(t)).join('');
      }

      container.innerHTML = html;
    }

    function taskCard(task) {
      const done    = task.completed;
      const tag     = done ? null : task.classification;
      const tagPill = tag ? `<span class="tag-pill tag-pill-${bucketCss(tag)}">${escHtml(bucketLabel(tag))}</span>` : '';
      const due     = task.dueDate ? `<span class="task-due">Due ${formatDate(task.dueDate)}</span>` : '';
      const updated = task.updated ? `<span class="task-due">Updated ${formatDate(task.updated)}</span>` : '';
      const notes   = task.notes   ? `<div class="task-notes">${escHtml(task.notes)}</div>` : '';
      const hasDetails = !!(due || updated || notes);

      const completeBtn = done
        ? `<div class="task-check task-check-done">✓</div>`
        : `<button class="task-check task-check-btn" title="Mark complete" onclick="completeTask('${escHtml(task.id)}')">○</button>`;

      return `
        <div class="task-card${done ? ' task-card-done' : ''}${tag ? ` task-card-${bucketCss(tag)}` : ''}" data-task-id="${escHtml(task.id)}">
          ${completeBtn}
          <div class="task-body${hasDetails ? ' task-body-expandable' : ''}"
               ${hasDetails ? `onclick="toggleExpand(this)"` : ''}>
            <div class="task-name${done ? ' task-name-done' : ''}">${tagPill}${escHtml(task.name)}</div>
            ${hasDetails ? `
            <div class="task-details">
              ${due}${updated}${notes}
            </div>` : ''}
          </div>
          ${hasDetails ? '<div class="task-expand-icon" onclick="toggleExpand(this.previousElementSibling)">›</div>' : ''}
          <div class="task-actions">
            <button class="task-action-btn" title="Edit task" onclick="openEditModal('${escHtml(task.id)}')">Edit</button>
            <button class="task-action-btn task-action-delete" title="Delete task" onclick="openDeleteModal('${escHtml(task.id)}')">Delete</button>
          </div>
        </div>
      `;
    }

    function toggleExpand(bodyEl) {
      bodyEl.closest('.task-card').classList.toggle('task-card-expanded');
    }

    // ── Task actions ───────────────────────────────────────────

    async function completeTask(taskId) {
      const btn = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"] .task-check-btn`);
      if (btn) { btn.disabled = true; btn.textContent = '…'; }

      try {
        const res = await fetch(
          `/api/lists/${encodeURIComponent(listId)}/tasks/${encodeURIComponent(taskId)}/complete?provider=${encodeURIComponent(provider)}`,
          { method: 'PATCH', headers: authHeaders() }
        );
        if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
        await loadTasks();
      } catch (err) {
        showBanner(err.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '○'; }
      }
    }

    // ── Create / Edit modal ────────────────────────────────────

    function openCreateModal() {
      editingTaskId = null;
      document.getElementById('modal-title').textContent  = 'New Task';
      document.getElementById('modal-submit').textContent = 'Create Task';
      document.getElementById('modal-name').value     = '';
      document.getElementById('modal-notes').value    = '';
      document.getElementById('modal-due').value      = '';
      document.getElementById('modal-priority').value = 'low';
      document.getElementById('task-modal').style.display = 'flex';
      document.getElementById('modal-name').focus();
    }

    function openEditModal(taskId) {
      const task = taskById(taskId);
      if (!task) return;
      editingTaskId = taskId;
      document.getElementById('modal-title').textContent  = 'Edit Task';
      document.getElementById('modal-submit').textContent = 'Save Changes';
      document.getElementById('modal-name').value     = task.name  || '';
      document.getElementById('modal-notes').value    = task.notes || '';
      document.getElementById('modal-due').value      = toInputDate(task.dueDate);
      document.getElementById('modal-priority').value = task.priority || 'low';
      document.getElementById('task-modal').style.display = 'flex';
      document.getElementById('modal-name').focus();
    }

    function closeModal() {
      document.getElementById('task-modal').style.display = 'none';
      editingTaskId = null;
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('task-modal')) closeModal();
    }

    async function submitModal() {
      const name     = document.getElementById('modal-name').value.trim();
      const notes    = document.getElementById('modal-notes').value.trim();
      const due      = document.getElementById('modal-due').value;
      const priority = document.getElementById('modal-priority').value;

      if (!name) {
        document.getElementById('modal-name').focus();
        return;
      }

      const submitBtn = document.getElementById('modal-submit');
      submitBtn.disabled = true;
      const original = submitBtn.textContent;
      submitBtn.textContent = 'Saving…';

      const body = { name };
      if (notes)    body.notes    = notes;
      if (due)      body.dueDate  = due;
      if (provider !== 'google') body.priority = priority;

      try {
        if (editingTaskId) {
          // Update — also send notes/dueDate even if empty so user can clear them
          body.notes   = notes;
          body.dueDate = due || null;
          const res = await fetch(
            `/api/lists/${encodeURIComponent(listId)}/tasks/${encodeURIComponent(editingTaskId)}?provider=${encodeURIComponent(provider)}`,
            { method: 'PATCH', headers: authHeaders(), body: JSON.stringify(body) }
          );
          if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
          showBanner('Task updated.');
        } else {
          const res = await fetch(
            `/api/lists/${encodeURIComponent(listId)}/tasks?provider=${encodeURIComponent(provider)}`,
            { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) }
          );
          if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
          showBanner('Task created.');
        }
        closeModal();
        await loadTasks();
      } catch (err) {
        showBanner(err.message, 'error');
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = original;
      }
    }

    // ── Delete modal ───────────────────────────────────────────

    function openDeleteModal(taskId) {
      const task = taskById(taskId);
      if (!task) return;
      deletingTaskId = taskId;
      document.getElementById('delete-task-name').textContent = task.name;
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').style.display = 'none';
      deletingTaskId = null;
    }

    function handleDeleteOverlayClick(e) {
      if (e.target === document.getElementById('delete-modal')) closeDeleteModal();
    }

    async function confirmDelete() {
      if (!deletingTaskId) return;
      const deleteBtn = document.querySelector('#delete-modal .btn-danger');
      deleteBtn.disabled = true;
      deleteBtn.textContent = 'Deleting…';

      try {
        const res = await fetch(
          `/api/lists/${encodeURIComponent(listId)}/tasks/${encodeURIComponent(deletingTaskId)}?provider=${encodeURIComponent(provider)}`,
          { method: 'DELETE', headers: authHeaders() }
        );
        if (!res.ok) { const e = await res.json(); throw new Error(e.error); }
        showBanner('Task deleted.');
        closeDeleteModal();
        await loadTasks();
      } catch (err) {
        showBanner(err.message, 'error');
        deleteBtn.disabled    = false;
        deleteBtn.textContent = 'Delete';
      }
    }

    // ── Keyboard shortcuts ─────────────────────────────────────

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeModal();
        closeDeleteModal();
        closeFilterDropdown();
      }
      if ((e.key === 'Enter') && document.getElementById('task-modal').style.display !== 'none') {
        if (e.target.tagName !== 'TEXTAREA') { e.preventDefault(); submitModal(); }
      }
    });

    // ── Data loading ───────────────────────────────────────────

    async function loadTasks() {
      try {
        const res = await fetch(
          `/api/lists/${encodeURIComponent(listId)}/tasks?provider=${encodeURIComponent(provider)}`,
          { headers: authHeaders() }
        );
        if (res.status === 401) { logout(); return; }
        if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Failed to load tasks'); }

        const data  = await res.json();
        tasksData   = data.tasks || [];
        const shown = showCompleted ? tasksData : tasksData.filter(t => !t.completed);
        renderTasks(shown);
      } catch (err) {
        showBanner(err.message, 'error');
        document.getElementById('tasks-container').innerHTML =
          `<div class="empty-state">Could not load tasks.</div>`;
      }
    }

    async function init() {
      if (!listId) {
        document.getElementById('tasks-container').innerHTML =
          `<div class="empty-state">No list selected. <a href="/lists.html">Go back to lists.</a></div>`;
        return;
      }

      // Load this user's classification rules (custom or server defaults)
      try {
        const cfgRes = await fetch('/auth/me/classification', { headers: authHeaders() });
        if (cfgRes.ok) { const d = await cfgRes.json(); classificationConfig = d.rules; }
      } catch { /* leave null — classifyTask guards against this */ }
      buildFilterDropdown();

      try {
        const res = await fetch('/auth/me', { headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        document.getElementById('user-info').textContent =
          `${p.icon} ${p.label} · Signed in as ${data.user.username}`;
        showCompleted = !!data.user.showCompleted;
      } catch {
        document.getElementById('user-info').textContent = '';
      }

      await loadTasks();
    }

    init();
  </script>
  <footer class="site-footer">Copyright 2026, handsbreadth LLC</footer>
</body>
</html>
